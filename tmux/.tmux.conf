set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind r source-file ~/.tmux.conf

# Set so tmux session and window changes triggers autosave
set -g focus-events on

# Enable scrolling with the mouse
set -g mouse on

set -g base-index 1

set-window-option -g mode-keys vi
# bind-key C-a last-window
bind -r / last-window

bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Sonokai Espresso palette
# terminal bg: #312c2b
# tmux bg is slightly lighter to separate the bar from the terminal body

# Status bar background and text
set-option -g status-style "bg=#3a3432,fg=#e4e3e1"

# Active window
set-window-option -g window-status-current-style "bg=#81d0c9,fg=#1f1e1c,bold"
set-window-option -g window-status-current-format " #I:#W "

# Inactive windows
set-window-option -g window-status-style "bg=#3a3432,fg=#a49993"
set-window-option -g window-status-format " #I:#W "

# Pane border styling
set-option -g pane-border-style "fg=#90817b"
set-option -g pane-active-border-style "fg=#a6cd77"

# Message styling (e.g., prompts)
set-option -g message-style "bg=#3a3432,fg=#9fa0e1"

# Command prompt (e.g., after prefix + :)
set-option -g message-command-style "bg=#3a3432,fg=#a6cd77"

# Mode indicators (copy mode, etc.)
set-window-option -g mode-style "bg=#f0c66f,fg=#1f1e1c,bold"

# Status left/right (optional minimal info bar)
set-option -g status-left ""
set-option -g status-right "#[fg=#a49993] %Y-%m-%d "
