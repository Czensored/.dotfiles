set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"
set -s escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g @plugin 'tmux-plugins/tmux-yank'
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind r source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Set so tmux session and window changes triggers autosave
set -g focus-events on

# Enable scrolling with the mouse
set -g mouse on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g history-limit 50000

# Slower status bar updates as there's nothing that has to be updated often
set -g status-interval 60

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

set-window-option -g mode-keys vi
bind -r / last-window

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

bind-key f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Sonokai Espresso palette
# terminal bg: #312c2b
# tmux bg is slightly lighter to separate the bar from the terminal body

# Status bar background and text
set-option -g status-style "bg=#3a3432,fg=#e4e3e1"

# Active window
set-window-option -g window-status-current-style "bg=#81d0c9,fg=#1f1e1c,bold"
set-window-option -g window-status-current-format " #I:#W "

# Inactive windows
set-window-option -g window-status-style "bg=#3a3432,fg=#a49993"
set-window-option -g window-status-format " #I:#W "

# Pane border styling
set-option -g pane-border-style "fg=#90817b"
set-option -g pane-active-border-style "fg=#a6cd77"

# Message styling (e.g., prompts)
set-option -g message-style "bg=#3a3432,fg=#9fa0e1"

# Command prompt (e.g., after prefix + :)
set-option -g message-command-style "bg=#3a3432,fg=#a6cd77"

# Mode indicators (copy mode, etc.)
set-window-option -g mode-style "bg=#f0c66f,fg=#1f1e1c,bold"

# Status left/right (optional minimal info bar)
set-option -g status-left ""
set-option -g status-right "#[fg=#a49993] %Y-%m-%d "

# Block accidental Escape in Codex and Claude panes (not during tmux modes like choose-tree)
bind-key -T root Escape if -F '#{&&:#{||:#{==:#{@codex_pane},1},#{==:#{@claude_pane},1}},#{!:#{pane_in_mode}}}' \
  'display-message "Esc blocked; use prefix + Escape to send it"' \
  'send-keys Escape'

# Intentional interrupt: tmux prefix, then Escape
bind-key Escape if -F '#{&&:#{||:#{==:#{@codex_pane},1},#{==:#{@claude_pane},1}},#{!:#{pane_in_mode}}}' \
  'send-keys Escape' \
  'send-keys Escape'

run '~/.tmux/plugins/tpm/tpm'
